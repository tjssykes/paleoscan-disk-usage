name: Build Windows executable

# Runs whenever you push a version tag, e.g.:
#   git tag v1.0.0
#   git push origin v1.0.0
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:  # also allows manually triggering from the Actions tab

permissions:
  contents: write  # needed to create a release and upload assets

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build executable
        run: >
          pyinstaller --onefile --windowed
          --name "PaleoScanDiskUsage"
          paleoscan_disk_usage.py

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: PaleoScanDiskUsage-windows
          path: dist/PaleoScanDiskUsage.exe

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/PaleoScanDiskUsage.exe
